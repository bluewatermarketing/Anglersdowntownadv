name: Weekly blog draft

# Runs every Monday at 13:00 UTC (≈9 AM Eastern).
# Picks the next topic from scripts/blog-topics.txt, drafts a post via the
# Claude API, opens a pull request — GitHub emails you about the new PR.
# You review, edit, remove `draft: true`, merge → Vercel deploys it.
#
# Manual run: GitHub → Actions tab → "Weekly blog draft" → "Run workflow"
#
# ── ONE-TIME SETUP REQUIRED ──────────────────────────────────────────
# 1. Add ANTHROPIC_API_KEY as a repository secret:
#    https://github.com/bluewatermarketing/Anglersdowntownadv/settings/secrets/actions
#    → New repository secret → Name: ANTHROPIC_API_KEY → Value: sk-ant-...
#
# 2. Allow Actions to open pull requests:
#    Settings → Actions → General → Workflow permissions
#    → Enable "Read and write permissions"
#    → Enable "Allow GitHub Actions to create and approve pull requests"
#
# 3. (Optional) Tweak the cron schedule below — current = every Monday 9am ET.

on:
  schedule:
    - cron: "0 13 * * 1"   # every Monday at 13:00 UTC
  workflow_dispatch: {}     # also allow manual triggering from the Actions tab

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # push branch
      pull-requests: write     # open the PR

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Draft from queue
        id: draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/draft-from-queue.ts

      - name: Open pull request
        if: steps.draft.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.draft.outputs.slug }}
          TITLE: ${{ steps.draft.outputs.title }}
          EXCERPT: ${{ steps.draft.outputs.excerpt }}
          FILE_PATH: ${{ steps.draft.outputs.file_path }}
          TOPIC: ${{ steps.draft.outputs.topic }}
        run: |
          set -euo pipefail
          BRANCH="blog/auto-draft/${SLUG}"

          git config user.name "Angler Blog Bot"
          git config user.email "actions@github.com"

          git checkout -b "$BRANCH"
          git add scripts/blog-topics.txt "$FILE_PATH"
          git commit -m "Draft: ${TITLE}"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "📝 Auto-draft: ${TITLE}" \
            --body "$(cat <<EOF
          ## Auto-drafted blog post — ready for review

          **Topic:** ${TOPIC}
          **File:** \`${FILE_PATH}\`
          **Excerpt:** ${EXCERPT}

          ---

          This post was auto-drafted by the weekly cron at \`.github/workflows/draft-weekly.yml\`. It currently has \`draft: true\` in its frontmatter, so it does **not** appear on the live site at https://www.anglerwatersports.com/blog. It **does** appear on the Vercel preview deploy for this PR — click the Vercel comment below to see it rendered.

          ## Before merging

          - [ ] Read through the post and edit any robotic phrasing or AI tells
          - [ ] Add 1-2 first-hand details if relevant (recent wildlife sighting, weather observation, guest story) — this is what Google rewards over generic AI content
          - [ ] **Remove the \`draft: true\` line** from the frontmatter
          - [ ] Check the cover image (if you want one — the post will use a default if none is set)
          - [ ] Approve and merge — Vercel deploys to production automatically

          ## Don't want this post?

          Just close the PR. The topic is already marked as used in \`scripts/blog-topics.txt\` so it won't be re-drafted. Add a fresh topic to that file if you want next week's run to draft something different.

          ---

          _Generated by Claude Opus 4.7 via \`scripts/draft-from-queue.ts\`. Cost: ~\$0.05–\$0.10._
          EOF
          )"
